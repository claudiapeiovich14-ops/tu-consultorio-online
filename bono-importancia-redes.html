document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  body { margin:0; background:#0A0A0A; -webkit-font-smoothing:antialiased; }\n  * { box-sizing:border-box; }\n  ::selection { background:#C9A24B; color:#0A0A0A; }\n  ::-webkit-scrollbar { width:10px; }\n  ::-webkit-scrollbar-thumb { background:#2A2519; border-radius:8px; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div style=\"font-family:Mulish,sans-serif; color:#E8E3D6; background:#0A0A0A; min-height:100vh; display:flex;\">\n\n  <!-- ===== SIDEBAR (índice a la izquierda) ===== -->\n  <aside style=\"width:268px; flex:none; background:#0C0B09; border-right:1px solid rgba(201,162,75,.12); display:flex; flex-direction:column; height:100vh; position:sticky; top:0;\">\n    <div style=\"padding:24px 22px 18px; display:flex; align-items:center; gap:13px; border-bottom:1px solid rgba(201,162,75,.12);\">\n      <img src=\"4bd16e03-39a2-4508-a215-3d648b22bacd\" alt=\"CAP\" style=\"width:46px; height:46px; border-radius:50%; flex:none;\">\n      <div style=\"line-height:1.15;\">\n        <div style=\"font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:700; color:#F2ECDD;\">Bono · Guía<\u002Fdiv>\n        <div style=\"font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:#A87A2E; font-weight:700;\">CAP Innova<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"padding:18px 18px 6px; font-size:10.5px; letter-spacing:.2em; text-transform:uppercase; color:#7A7468; font-weight:800;\">Contenido<\u002Fdiv>\n    <nav style=\"padding:4px 12px; flex:1; overflow-y:auto;\">\n      <sc-for list=\"{{ toc }}\" as=\"it\" hint-placeholder-count=\"5\">\n        <button data-bono-idx=\"{{ it.num }}\" onclick=\"{{ it.onClick }}\" style=\"{{ it.style }}\">\n          <span style=\"{{ it.numStyle }}\">{{ it.num }}<\u002Fspan>\n          <span style=\"text-align:left; line-height:1.25;\">{{ it.label }}<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fnav>\n\n    <div style=\"padding:14px 18px 20px; border-top:1px solid rgba(201,162,75,.12);\">\n      <button onclick=\"{{ download }}\" style=\"width:100%; display:flex; align-items:center; justify-content:center; gap:8px; background:linear-gradient(180deg,#E3C97E,#C9A24B); color:#1A140A; border:none; border-radius:12px; padding:13px; font-weight:800; font-size:14px; cursor:pointer; box-shadow:0 8px 22px rgba(201,162,75,.22);\">\n        <span style=\"font-size:15px;\">↓<\u002Fspan> Descargar PDF\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- ===== CONTENIDO (derecha) ===== -->\n  <main id=\"bono-scroller\" style=\"flex:1; min-width:0; height:100vh; overflow-y:auto;\">\n    <div style=\"max-width:760px; margin:0 auto; padding:0 0 90px;\">\n\n      <!-- HERO -->\n      <section id=\"sec-0\" style=\"position:relative; padding:74px 56px 56px; overflow:hidden;\">\n        <div style=\"position:absolute; inset:0; background:radial-gradient(100% 70% at 30% -10%, rgba(201,162,75,.16), transparent 60%);\"><\u002Fdiv>\n        <div style=\"position:relative;\">\n          <div style=\"display:inline-block; font-weight:700; font-size:11px; letter-spacing:.26em; text-transform:uppercase; color:#C9A24B; border:1px solid rgba(201,162,75,.45); border-radius:999px; padding:7px 16px;\">Bono · Guía educativa<\u002Fdiv>\n          <h1 style=\"font-family:'Cormorant Garamond',serif; font-weight:600; font-size:52px; line-height:1.03; margin:24px 0 0; letter-spacing:-.005em; color:#F6F1E6; max-width:13em;\">Por qué hoy un profesional de la salud necesita estar en redes<\u002Fh1>\n          <div style=\"width:54px; height:2px; background:linear-gradient(90deg,#B58A37,#E3C97E); margin:24px 0 0;\"><\u002Fdiv>\n          <p style=\"font-size:17px; line-height:1.6; color:#C7C2B6; margin:22px 0 0; max-width:32em;\">No se trata de moda ni de exponerte. Se trata de que las personas que ya te necesitan puedan encontrarte y confiar en vos.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <div style=\"padding:0 56px;\">\n\n        <!-- INTRO -->\n        <section id=\"sec-1\" style=\"padding:34px 0 46px; border-top:1px solid rgba(201,162,75,.1);\">\n          <p style=\"font-family:'Cormorant Garamond',serif; font-size:25px; line-height:1.42; color:#F2ECDD; font-weight:500; margin:0 0 18px; letter-spacing:-.005em;\">Tal vez sientas que las redes no son para vos. Que son para gente más joven o para vender cosas.<\u002Fp>\n          <p style=\"font-size:15.5px; line-height:1.74; margin:0 0 14px; color:#BDB8AC;\">Es una idea muy común… y es la que hace que cientos de buenos profesionales sigan siendo invisibles para los pacientes que más los necesitan. La verdad es más simple: hoy las redes son el lugar donde la gente decide en quién confiar su salud.<\u002Fp>\n          <p style=\"font-size:15.5px; line-height:1.74; margin:0; color:#BDB8AC;\">Esta guía corta te muestra <strong style=\"color:#F2ECDD; font-weight:700;\">por qué importa<\u002Fstrong>, sin presión y sin tecnicismos. Cuando termines de leerla, vas a querer dar el paso.<\u002Fp>\n        <\u002Fsection>\n\n        <!-- DATOS -->\n        <section id=\"sec-2\" style=\"margin-bottom:50px; background:linear-gradient(180deg,#15130E,#100E09); border:1px solid rgba(201,162,75,.25); border-radius:18px; padding:34px 36px; position:relative; overflow:hidden;\">\n          <div style=\"position:absolute; right:-50px; top:-50px; width:170px; height:170px; border-radius:50%; border:1px solid rgba(201,162,75,.22);\"><\u002Fdiv>\n          <div style=\"font-weight:700; font-size:11px; letter-spacing:.26em; text-transform:uppercase; color:#C9A24B; margin-bottom:20px;\">Lo que pasa hoy, te guste o no<\u002Fdiv>\n          <div style=\"display:flex; flex-wrap:wrap; gap:18px;\">\n            <div style=\"flex:1 1 150px; min-width:150px;\">\n              <div style=\"font-family:'Cormorant Garamond',serif; font-size:42px; font-weight:700; color:#E3C97E; line-height:1;\">8 de 10<\u002Fdiv>\n              <p style=\"font-size:13px; line-height:1.5; color:#A39D90; margin:8px 0 0;\">personas buscan en internet a su profesional de salud antes de sacar un turno.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"flex:1 1 150px; min-width:150px;\">\n              <div style=\"font-family:'Cormorant Garamond',serif; font-size:42px; font-weight:700; color:#E3C97E; line-height:1;\">1°<\u002Fdiv>\n              <p style=\"font-size:13px; line-height:1.5; color:#A39D90; margin:8px 0 0;\">lo que miran es tu perfil: tu foto, qué decís y cómo contactarte.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"flex:1 1 150px; min-width:150px;\">\n              <div style=\"font-family:'Cormorant Garamond',serif; font-size:42px; font-weight:700; color:#E3C97E; line-height:1;\">24/7<\u002Fdiv>\n              <p style=\"font-size:13px; line-height:1.5; color:#A39D90; margin:8px 0 0;\">tu perfil trabaja por vos: te presenta incluso mientras dormís o atendés.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- 5 RAZONES -->\n        <section id=\"sec-3\" style=\"margin-bottom:50px;\">\n          <div style=\"font-weight:700; font-size:11px; letter-spacing:.26em; text-transform:uppercase; color:#A87A2E; margin-bottom:8px;\">5 razones reales<\u002Fdiv>\n          <h2 style=\"font-family:'Cormorant Garamond',serif; font-weight:600; font-size:32px; line-height:1.08; margin:0 0 24px; color:#F6F1E6;\">Lo que una buena presencia hace por vos<\u002Fh2>\n          <div style=\"display:flex; flex-direction:column; gap:14px;\">\n            <sc-for list=\"{{ reasons }}\" as=\"r\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex; gap:20px; align-items:flex-start; background:#15130E; border:1px solid rgba(201,162,75,.16); border-radius:14px; padding:22px 24px;\">\n                <span style=\"flex:none; font-family:'Cormorant Garamond',serif; font-weight:700; font-size:38px; line-height:.9; color:#C9A24B;\">{{ r.n }}<\u002Fspan>\n                <div>\n                  <h3 style=\"margin:0 0 6px; font-size:17.5px; font-weight:800; color:#EFE9DB;\">{{ r.title }}<\u002Fh3>\n                  <p style=\"margin:0; font-size:14.5px; line-height:1.6; color:#B7B1A4;\">{{ r.body }}<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- 3 MIEDOS -->\n        <section id=\"sec-4\" style=\"margin-bottom:50px;\">\n          <div style=\"font-weight:700; font-size:11px; letter-spacing:.26em; text-transform:uppercase; color:#A87A2E; margin-bottom:8px;\">Sacate el peso de encima<\u002Fdiv>\n          <h2 style=\"font-family:'Cormorant Garamond',serif; font-weight:600; font-size:32px; line-height:1.08; margin:0 0 24px; color:#F6F1E6;\">3 miedos que te frenan (y la verdad)<\u002Fh2>\n          <div style=\"display:flex; flex-direction:column; gap:14px;\">\n            <sc-for list=\"{{ fears }}\" as=\"f\" hint-placeholder-count=\"3\">\n              <div style=\"background:#15130E; border:1px solid rgba(201,162,75,.14); border-radius:14px; padding:22px 24px;\">\n                <div style=\"display:flex; gap:10px; align-items:flex-start; margin-bottom:8px;\">\n                  <span style=\"flex:none; color:#A8896A; font-weight:800; font-size:13px;\">MITO<\u002Fspan>\n                  <p style=\"margin:0; font-size:15.5px; font-weight:700; color:#E6E0D2; font-style:italic;\">{{ f.myth }}<\u002Fp>\n                <\u002Fdiv>\n                <div style=\"display:flex; gap:10px; align-items:flex-start;\">\n                  <span style=\"flex:none; color:#E3C97E; font-weight:800; font-size:13px;\">REAL<\u002Fspan>\n                  <p style=\"margin:0; font-size:14.5px; line-height:1.6; color:#B7B1A4;\">{{ f.truth }}<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- CIERRE -->\n        <section id=\"sec-5\" style=\"position:relative; background:linear-gradient(180deg,#16140C,#100E09); border:1px solid rgba(201,162,75,.4); border-radius:20px; padding:40px 38px; text-align:center; overflow:hidden;\">\n          <div style=\"position:absolute; inset:0; background:radial-gradient(90% 80% at 50% 110%, rgba(201,162,75,.16), transparent 60%);\"><\u002Fdiv>\n          <div style=\"position:relative;\">\n            <img src=\"4bd16e03-39a2-4508-a215-3d648b22bacd\" alt=\"CAP INNOVA\" style=\"width:62px; height:62px; border-radius:50%; display:block; margin:0 auto 20px;\">\n            <h2 style=\"font-family:'Cormorant Garamond',serif; font-weight:600; font-size:30px; line-height:1.12; margin:0 auto; color:#F6F1E6; max-width:15em;\">No tenés que volverte experto en redes. Solo tenés que estar.<\u002Fh2>\n            <p style=\"font-size:15px; line-height:1.62; color:#C7C2B6; margin:16px auto 0; max-width:30em;\">El primer paciente que te encuentre por internet va a hacer que todo esto valga la pena. Y dar el paso es más fácil de lo que pensás: tu herramienta <em style=\"color:#E3C97E; font-style:normal;\">Tu Consultorio Online<\u002Fem> te lleva de la mano.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fmain>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { active: 0 };\n\n  componentDidMount(){\n    this._onClick = (e) => {\n      const btn = e.target.closest('[data-bono-idx]');\n      if (!btn) return;\n      const n = parseInt(btn.getAttribute('data-bono-idx'), 10);\n      if (!isNaN(n)) this.go(n - 1);\n    };\n    document.addEventListener('click', this._onClick, true);\n  }\n  componentWillUnmount(){ document.removeEventListener('click', this._onClick, true); }\n\n  go(i){\n    this.setState({ active: i });\n    const sc = document.querySelector('#bono-scroller');\n    const el = document.querySelector('#sec-' + i);\n    if (sc && el) {\n      const top = sc.scrollTop + el.getBoundingClientRect().top - sc.getBoundingClientRect().top - 12;\n      sc.scrollTo({ top, behavior: 'smooth' });\n    }\n  }\n\n  renderVals(){\n    const labels = [\"Portada\", \"Introducción\", \"Los datos de hoy\", \"5 razones reales\", \"3 miedos (y la verdad)\", \"Cierre\"];\n    const toc = labels.map((label, i) => {\n      const on = this.state.active === i;\n      return {\n        label, num: String(i+1),\n        onClick: () => this.go(i),\n        style: \"width:100%; display:flex; align-items:center; gap:12px; background:\" + (on ? \"#1C1810\" : \"transparent\") + \"; border:1px solid \" + (on ? \"rgba(201,162,75,.4)\" : \"transparent\") + \"; border-radius:11px; padding:10px 12px; margin-bottom:4px; cursor:pointer; color:\" + (on ? \"#F2ECDD\" : \"#A8A296\") + \"; font-size:13.5px; font-weight:\" + (on ? \"800\" : \"600\") + \"; text-align:left;\",\n        numStyle: \"flex:none; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; background:\" + (on ? \"linear-gradient(180deg,#E3C97E,#C9A24B)\" : \"#211D14\") + \"; color:\" + (on ? \"#1A140A\" : \"#8E887C\") + \";\",\n      };\n    });\n\n    return {\n      toc,\n      download: () => window.print(),\n      reasons: [\n        { n:\"01\", title:\"Te encuentran los que ya te buscan\", body:\"No tenés que convencer a nadie: hay personas buscando justo lo que hacés. Estar presente es la diferencia entre que te elijan a vos o al de al lado.\" },\n        { n:\"02\", title:\"Generás confianza antes de la primera consulta\", body:\"Ver tu cara, leer cómo explicás y notar que respondés genera seguridad. El paciente llega más tranquilo y más decidido.\" },\n        { n:\"03\", title:\"Proyectás una imagen profesional y seria\", body:\"Un perfil ordenado y claro dice \\u201Cacá hay alguien serio\\u201D. No hace falta producción: hace falta prolijidad y constancia simple.\" },\n        { n:\"04\", title:\"No dependés solo del boca a boca\", body:\"El boca a boca es valioso, pero lento y con techo. Las redes lo multiplican: una sola recomendación puede llegar a cientos.\" },\n        { n:\"05\", title:\"Abrís la puerta a la atención online\", body:\"Estar visible es el primer paso para sumar pacientes a distancia y más ingresos, sin recargar tu agenda presencial.\" },\n      ],\n      fears: [\n        { myth:\"\\u201CNo tengo nada para mostrar / no sé qué publicar.\\u201D\", truth:\"No necesitás contenido elaborado. Con presentarte, responder dudas frecuentes e invitar a sacar turno alcanza para empezar.\" },\n        { myth:\"\\u201CMe da vergüenza exponerme.\\u201D\", truth:\"No tenés que mostrar tu vida ni aparecer en cámara. Es tu perfil profesional: tu cara, qué hacés y cómo contactarte. Nada más.\" },\n        { myth:\"\\u201CNo tengo tiempo para esto.\\u201D\", truth:\"Configurarlo lleva una tarde y mantenerlo, minutos por semana. Trabaja por vos las 24 horas a cambio de muy poco.\" },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
